name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - ".claude/**"
      - "**.md"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - ".claude/**"
      - "**.md"
      - "LICENSE"
      - ".gitignore"

jobs:
  check:
    name: Lint, format & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier
        run: bun run check

      - name: ESLint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc --noEmit
